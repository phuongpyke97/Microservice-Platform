  # Python AI Worker
  ai-media-worker:
    build:
      context: ./python-services/ai-media-worker
      dockerfile: Dockerfile
    ports:
      - "${AI_WORKER_HTTP_PORT:-8765}:8765"
      - "${AI_WORKER_GRPC_PORT:-50051}:50051"
    environment:
      AI_WORKER_HTTP_PORT: 8765
      AI_WORKER_GRPC_PORT: 50051

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  loki_data:
  prometheus_data:
  grafana_data:
