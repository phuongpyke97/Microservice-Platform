version: '3.8'

services:
  # Data Stores
  postgres:
    image: postgres:16.2
    environment:
      POSTGRES_DB: platform_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2.4-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Monitoring
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring-server/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infrastructure/monitoring-server/crbt-monitoring-rules.yml:/etc/prometheus/crbt-monitoring-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring-server/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:2.9.4
    ports:
      - "3100:3100"
    entrypoint: sh -c "mkdir -p /loki/index /loki/index_cache /loki/chunks && /usr/bin/loki -config.file=/etc/loki/local-config.yaml"
    volumes:
      - loki_data:/loki
      - ./infrastructure/monitoring-server/loki-config.yaml:/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.4
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infrastructure/monitoring-server/promtail-config.yaml:/etc/promtail/config.yaml
    depends_on:
      - loki

  # Infrastructure Services
  eureka-server:
    build:
      context: ./infrastructure/eureka-server
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  config-server:
    build:
      context: ./infrastructure/config-server
      dockerfile: Dockerfile
    ports:
      - "8889:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native,docker
      EUREKA_HOST: eureka-server
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  api-gateway:
    build:
      context: ./infrastructure/api-gateway
      dockerfile: Dockerfile
    ports:
      - "18080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_HOST: eureka-server
      CONFIG_SERVER_HOST: config-server
      REDIS_HOST: redis
      JWT_SECRET: platform-jwt-secret-for-dev-only-change-in-production
      CRBT_SHARED_SECRET: crbt-shared-secret-dev
      CRBT_VERIFY_ENDPOINT: http://localhost/crbt/verify
    depends_on:
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Infra Services
  auth-service:
    build:
      context: ./infra-services/auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EUREKA_HOST: eureka-server
      CONFIG_SERVER_HOST: config-server
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: platform-jwt-secret-for-dev-only-change-in-production
      CRBT_SHARED_SECRET: crbt-shared-secret-dev
      CRBT_VERIFY_ENDPOINT: http://localhost/crbt/verify
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ./infra-services/notification-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_HOST: eureka-server
      CONFIG_SERVER_HOST: config-server
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  file-service:
    build:
      context: ./infra-services/file-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EUREKA_HOST: eureka-server
      CONFIG_SERVER_HOST: config-server
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  audit-log-service:
    build:
      context: ./infra-services/audit-log-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EUREKA_HOST: eureka-server
      CONFIG_SERVER_HOST: config-server
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-gateway-service:
    build:
      context: ./infra-services/payment-gateway-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EUREKA_HOST: eureka-server
      CONFIG_SERVER_HOST: config-server
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  credit-wallet-service:
    build:
      context: ./infra-services/credit-wallet-service
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EUREKA_HOST: eureka-server
      CONFIG_SERVER_HOST: config-server
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      REDIS_HOST: redis
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Business Services
  crbt-campaign-service:
    build:
      context: ./business-services/crbt-campaign-service
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EUREKA_HOST: eureka-server
      CONFIG_SERVER_HOST: config-server
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  crbt-community-library:
    build:
      context: ./business-services/crbt-community-library
      dockerfile: Dockerfile
    ports:
      - "8091:8091"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EUREKA_HOST: eureka-server
      CONFIG_SERVER_HOST: config-server
      REDIS_HOST: redis
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  audio-generation-service:
    build:
      context: ./business-services/audio-generation-service
      dockerfile: Dockerfile
    ports:
      - "8092:8092"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_HOST: eureka-server
      CONFIG_SERVER_HOST: config-server
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBIT_HOST: rabbitmq
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
      REDIS_HOST: redis
      AI_WORKER_HOST: ai-media-worker
      AUDIO_GEN_DB: audio_gen_db
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  crbt-credit-transaction-service:
    build:
      context: ./business-services/crbt-credit-transaction-service
      dockerfile: Dockerfile
    ports:
      - "8093:8093"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EUREKA_HOST: eureka-server
      CONFIG_SERVER_HOST: config-server
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  crbt-core-adapter:
    build:
      context: ./business-services/crbt-core-adapter
      dockerfile: Dockerfile
    ports:
      - "8094:8094"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      EUREKA_HOST: eureka-server
      CONFIG_SERVER_HOST: config-server
      RABBIT_HOST: rabbitmq
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Python AI Worker
  ai-media-worker:
    build:
      context: ./python-services/ai-media-worker
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
      - "50051:50051"
    environment:
      AI_WORKER_HTTP_PORT: 8765
      AI_WORKER_GRPC_PORT: 50051

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  loki_data:
  prometheus_data:
  grafana_data:
