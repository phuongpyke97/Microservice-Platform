      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      EUREKA_HOST: ${EUREKA_HOST:-eureka-server}
      EUREKA_USER: ${EUREKA_USER:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret}
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST:-config-server}
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configsecret}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  credit-wallet-service:
    build:
      context: ./infra-services/credit-wallet-service
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      EUREKA_HOST: ${EUREKA_HOST:-eureka-server}
      EUREKA_USER: ${EUREKA_USER:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret}
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST:-config-server}
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configsecret}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Business Services
  crbt-campaign-service:
    build:
      context: ./business-services/crbt-campaign-service
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      EUREKA_HOST: ${EUREKA_HOST:-eureka-server}
      EUREKA_USER: ${EUREKA_USER:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret}
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST:-config-server}
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configsecret}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  crbt-community-library:
    build:
      context: ./business-services/crbt-community-library
      dockerfile: Dockerfile
    ports:
      - "8091:8091"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      EUREKA_HOST: ${EUREKA_HOST:-eureka-server}
      EUREKA_USER: ${EUREKA_USER:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret}
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST:-config-server}
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configsecret}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  audio-generation-service:
    build:
      context: ./business-services/audio-generation-service
      dockerfile: Dockerfile
    ports:
      - "8092:8092"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_HOST: ${EUREKA_HOST:-eureka-server}
      EUREKA_USER: ${EUREKA_USER:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret}
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST:-config-server}
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configsecret}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      AI_WORKER_HOST: ${AI_WORKER_HOST:-ai-media-worker}
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  crbt-credit-transaction-service:
    build:
      context: ./business-services/crbt-credit-transaction-service
      dockerfile: Dockerfile
    ports:
      - "8093:8093"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      EUREKA_HOST: ${EUREKA_HOST:-eureka-server}
      EUREKA_USER: ${EUREKA_USER:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret}
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST:-config-server}
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configsecret}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  crbt-core-adapter:
    build:
      context: ./business-services/crbt-core-adapter
      dockerfile: Dockerfile
    ports:
      - "8094:8094"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      EUREKA_HOST: ${EUREKA_HOST:-eureka-server}
      EUREKA_USER: ${EUREKA_USER:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret}
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST:-config-server}
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configsecret}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
