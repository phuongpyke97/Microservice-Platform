version: '3.8'

services:
  # Data Stores
  postgres:
    image: postgres:${POSTGRES_VERSION:-16.2}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-platform_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:${REDIS_VERSION:-7.2.4-alpine}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION:-3.12-management-alpine}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:${MINIO_VERSION:-latest}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Monitoring
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v2.51.0}
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring-server/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infrastructure/monitoring-server/crbt-monitoring-rules.yml:/etc/prometheus/crbt-monitoring-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-10.4.2}
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring-server/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:${LOKI_VERSION:-2.9.4}
    ports:
      - "3100:3100"
    entrypoint: sh -c "mkdir -p /loki/index /loki/index_cache /loki/chunks && /usr/bin/loki -config.file=/etc/loki/local-config.yaml"
    volumes:
      - loki_data:/loki
      - ./infrastructure/monitoring-server/loki-config.yaml:/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:${PROMTAIL_VERSION:-2.9.4}
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infrastructure/monitoring-server/promtail-config.yaml:/etc/promtail/config.yaml
    depends_on:
      - loki

  # Infrastructure Services
  eureka-server:
    build:
      context: ./infrastructure/eureka-server
      dockerfile: Dockerfile
    ports:
      - "${EUREKA_PORT:-8761}:8761"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_USER: ${EUREKA_USER:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  config-server:
    build:
      context: ./infrastructure/config-server
      dockerfile: Dockerfile
    ports:
      - "${CONFIG_SERVER_PORT:-8889}:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native,${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_HOST: ${EUREKA_HOST:-eureka-server}
      EUREKA_USER: ${EUREKA_USER:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret}
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configsecret}
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  api-gateway:
    build:
      context: ./infrastructure/api-gateway
      dockerfile: Dockerfile
    ports:
      - "${API_GATEWAY_PORT_EXTERNAL:-18080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_HOST: ${EUREKA_HOST:-eureka-server}
      EUREKA_USER: ${EUREKA_USER:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret}
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST:-config-server}
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configsecret}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      CRBT_SHARED_SECRET: ${CRBT_SHARED_SECRET}
    depends_on:
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Infra Services
  auth-service:
    build:
      context: ./infra-services/auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      EUREKA_HOST: ${EUREKA_HOST:-eureka-server}
      EUREKA_USER: ${EUREKA_USER:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret}
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST:-config-server}
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configsecret}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      JWT_SECRET: ${JWT_SECRET}
      CRBT_SHARED_SECRET: ${CRBT_SHARED_SECRET}
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ./infra-services/notification-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_HOST: ${EUREKA_HOST:-eureka-server}
      EUREKA_USER: ${EUREKA_USER:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret}
      CONFIG_SERVER_HOST: ${CONFIG_SERVER_HOST:-config-server}
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configsecret}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
