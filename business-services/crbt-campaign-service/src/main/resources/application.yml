spring:
  application:
    name: crbt-campaign-service
  config:
    import: optional:configserver:http://${CONFIG_SERVER_USER:configuser}:${CONFIG_SERVER_PASSWORD:configsecret}@${CONFIG_SERVER_HOST:localhost}:8888
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/campaign_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: 8090

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:eurekauser}:${EUREKA_PASSWORD:eurekasecret}@${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.platform: INFO
