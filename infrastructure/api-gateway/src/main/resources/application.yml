server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://${CONFIG_SERVER_USER:configuser}:${CONFIG_SERVER_PASSWORD:configsecret}@${CONFIG_SERVER_HOST:localhost}:8888
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: ${security.rate-limit.replenish-rate}
            redis-rate-limiter.burstCapacity: ${security.rate-limit.burst-capacity}
            key-resolver: '#{@userKeyResolver}'
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

security:
  jwt:
    secret: ${JWT_SECRET}
  crbt:
    shared-secret: ${CRBT_SHARED_SECRET}
  rate-limit:
    replenish-rate: 10
    burst-capacity: 20

ai-media:
  worker:
    url: http://${AI_WORKER_HOST:ai-media-worker}:${AI_WORKER_HTTP_PORT:8765}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:eureka}:${EUREKA_PASSWORD:eureka-secret}@${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
