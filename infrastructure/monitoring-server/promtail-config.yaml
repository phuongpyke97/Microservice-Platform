server:
  http_listen_port: 9080
positions:
  filename: /tmp/positions.yaml
clients:
  - url: http://loki:3100/loki/api/v1/push
scrape_configs:
  - job_name: platform-services
    static_configs:
      - targets:
          - localhost
        labels:
          job: platform
          __path__: /var/log/platform/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            trace_id: traceId
            service: service
      - labels:
          level:
          trace_id:
          service:
