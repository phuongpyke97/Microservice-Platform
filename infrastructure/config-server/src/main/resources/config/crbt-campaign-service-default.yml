server:
  port: 8090

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${CAMPAIGN_DB:campaign_db}
    username: ${POSTGRES_USER:user}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

lyria:
  api-key: ${GEMINI_API_KEY:}
  model: lyria-3-clip-preview
  daily-quota: 100
  timeout:
    connect-ms: ${LYRIA_CONNECT_TIMEOUT_MS:5000}
    read-ms: ${LYRIA_READ_TIMEOUT_MS:90000}  # 90s — AI music generation takes 20-60s
  pool:
    max-total: ${LYRIA_POOL_MAX_TOTAL:20}          # tổng connection tối đa
    max-per-route: ${LYRIA_POOL_MAX_PER_ROUTE:20}  # connection tới 1 host (googleapis.com)
    conn-ttl-sec: ${LYRIA_POOL_CONN_TTL_SEC:300}   # tái sử dụng connection tối đa 5 phút

resilience4j:
  circuitbreaker:
    instances:
      lyria:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slowCallDurationThreshold: 90s
        slowCallRateThreshold: 80
        permittedNumberOfCallsInHalfOpenState: 2
        registerHealthIndicator: true

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:eureka}:${EUREKA_PASSWORD:eureka-secret}@${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.platform.crbtcampaign: DEBUG
